# TTS Audio Suite Engines - Complete Reference Data
# This is the single source of truth for all engine documentation tables

runtime_isolation_modes:
  field_label: "⚠️ Runtime Isolation"
  modes:
    main_environment:
      label: "Main Environment"
      short_label: "Main"
      description: "Use the main ComfyUI Python environment."
    shared_runtime:
      label: "Shared Runtime"
      short_label: "Shared"
      description: "Use a secondary shared runtime for engines with dependency conflicts. This runtime reuses heavy base packages like PyTorch from the main environment when configured."
    dedicated_runtime:
      label: "Dedicated Runtime"
      short_label: "Dedicated"
      description: "Use a dedicated secondary runtime only for one engine when the shared runtime is not enough."

